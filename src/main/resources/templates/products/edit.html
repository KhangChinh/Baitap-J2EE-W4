<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa sản phẩm | Premium Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-bg: #f4f7fe;
        }

        body {
            background-color: var(--secondary-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2d3748;
            padding: 40px 20px;
        }

        .glass-card {
            max-width: 600px;
            margin: auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        .page-title {
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2rem;
            text-align: center;
        }

        .form-label {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }

        .btn-premium {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            color: white;
            opacity: 0.9;
        }

        .error {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 5px;
            font-weight: 500;
        }

        .current-img-box {
            background: #f8fafc;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
        }

        .current-img {
            width: 120px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="glass-card">
        <h1 class="page-title">Sửa Sản Phẩm</h1>
        <form th:action="@{/products/edit/{id}(id=${product.id})}" th:object="${product}" method="post"
            enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" th:field="*{name}" class="form-control"
                    th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Giá niêm yết (VNĐ)</label>
                <input type="number" th:field="*{price}" class="form-control"
                    th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                <div class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Danh mục</label>
                <select th:field="*{category}" class="form-select">
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat.displayName}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Thay đổi hình ảnh</label>
                <input type="file" name="imageFile" class="form-control">
                <div th:if="${product.image}" class="current-img-box">
                    <img th:src="@{'/images/' + ${product.image}}" class="current-img">
                    <p class="text-muted small mb-0 mt-2">Ảnh đang sử dụng</p>
                </div>
                <div class="error" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
            </div>
            <button type="submit" class="btn btn-premium">Cập nhật thay đổi</button>
            <a th:href="@{/products}" class="btn btn-link w-100 mt-2 text-decoration-none text-muted">Hủy bỏ</a>
        </form>
    </div>
</body>

</html>
