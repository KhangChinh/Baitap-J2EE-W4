<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm | Premium Store</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-bg: #f4f7fe;
        }

        body {
            background-color: var(--secondary-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #2d3748;
        }

        .main-container {
            padding: 40px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 40px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .product-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .product-img:hover {
            transform: scale(1.1);
        }

        .btn-premium {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
            color: white;
        }

        .table {
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        .table thead th {
            border: none;
            color: #a0aec0;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .table tbody tr {
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .table tbody td {
            border-top: 10px solid var(--secondary-bg);
            vertical-align: middle;
            padding: 20px;
        }

        .table tbody td:first-child {
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
        }

        .table tbody td:last-child {
            border-top-right-radius: 15px;
            border-bottom-right-radius: 15px;
        }

        .badge-category {
            background: #edf2f7;
            color: #4a5568;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="container main-container">
        <div class="glass-card">
            <div class="header-section">
                <h1 class="page-title">Sản Phẩm</h1>
                <a th:href="@{/products/add}" class="btn btn-premium">
                    <i class="fas fa-plus me-2"></i> Thêm sản phẩm
                </a>
            </div>

            <div th:if="${products.empty}" class="text-center py-5">
                <i class="fas fa-box-open fa-4x text-muted mb-3"></i>
                <p class="text-muted fs-5">Chưa có sản phẩm nào. Hãy thêm sản phẩm đầu tiên!</p>
            </div>

            <table class="table" th:if="${!products.empty}">
                <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Danh mục</th>
                        <th>Giá niêm yết</th>
                        <th class="text-end">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <div class="d-flex align-items-center">
                                <img th:if="${product.image}" th:src="@{'/images/' + ${product.image}}"
                                    class="product-img me-3">
                                <div th:unless="${product.image}"
                                    class="product-img me-3 bg-light d-flex align-items-center justify-content-center">
                                    <i class="fas fa-image text-muted"></i>
                                </div>
                                <div>
                                    <div class="fw-bold" th:text="${product.name}"></div>
                                    <div class="text-muted small">ID: <span th:text="${product.id}"></span></div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge-category" th:text="${product.category.displayName}"></span>
                        </td>
                        <td>
                            <div class="fw-bold text-primary"
                                th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                            </div>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}"
                                class="btn btn-sm btn-light me-2 rounded-pill">
                                <i class="fas fa-edit text-primary"></i>
                            </a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}"
                                class="btn btn-sm btn-light rounded-pill"
                                onclick="return confirm('Bạn có chắc chắn muốn xóa sản phẩm này?')">
                                <i class="fas fa-trash text-danger"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
